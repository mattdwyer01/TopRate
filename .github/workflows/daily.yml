name: TopRate Daily

# Triggered manually from the Actions tab or via API from the dashboard.
# The 'date' input lets you fetch a specific past day.
on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to fetch (YYYY-MM-DD). Leave blank for today.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  fetch-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas openpyxl

      - name: Configure git
        run: |
          git config user.name  "TopRate Bot"
          git config user.email "actions@github.com"

      - name: Run toprate_daily.py
        env:
          TOPRATE_EMAIL:    ${{ secrets.TOPRATE_EMAIL }}
          TOPRATE_PASSWORD: ${{ secrets.TOPRATE_PASSWORD }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python toprate_daily.py --date "${{ github.event.inputs.date }}"
          else
            python toprate_daily.py
          fi

      - name: Commit and push
        run: |
          git add toprate_live.html toprate_runners.csv toprate_model_picks.csv toprate_price_history.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "TopRate update via Actions $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

name: TopRate Daily

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target date (YYYY-MM-DD), leave blank for today'
        required: false
        default: ''
  schedule:
    # AEST = UTC+10. Times in AEST converted to UTC for cron.
    # 9:00 AEST  = 23:00 UTC (previous day)
    - cron: '0 23 * * *'
    # 12:00 AEST = 02:00 UTC
    - cron: '0 2 * * *'
    # Every 30 mins from 12:30 AEST to 21:00 AEST (02:30 UTC to 11:00 UTC)
    - cron: '30 2-10 * * *'
    - cron: '0 3-11 * * *'

jobs:
  run-toprate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests numpy pytz

      - name: Run TopRate script
        env:
          TOPRATE_USERNAME: ${{ secrets.TOPRATE_USERNAME }}
          TOPRATE_PASSWORD: ${{ secrets.TOPRATE_PASSWORD }}
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            python toprate_daily.py --date "${{ github.event.inputs.target_date }}"
          else
            python toprate_daily.py
          fi

      - name: Commit and push outputs
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Add each file individually so one missing file doesn't fail the rest
          git add toprate_runners.csv 2>/dev/null || true
          git add toprate_selections.csv 2>/dev/null || true
          git add toprate_price_history.csv 2>/dev/null || true
          git add toprate_live.html 2>/dev/null || true
          git add toprate_daily.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto: update TopRate data $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi

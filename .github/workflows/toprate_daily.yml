name: TopRate Daily
on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to re-fetch (YYYY-MM-DD). Leave blank for normal run.'
        required: false
        default: ''
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests pandas openpyxl
      - name: Download existing runners CSV
        uses: actions/download-artifact@v4
        with:
          name: runners-db
          path: .
        continue-on-error: true
      - name: Run TopRate daily script
        env:
          TOPRATE_EMAIL: ${{ secrets.TOPRATE_EMAIL }}
          TOPRATE_PASSWORD: ${{ secrets.TOPRATE_PASSWORD }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python toprate_daily.py --date ${{ github.event.inputs.date }}
          else
            python toprate_daily.py
          fi
      - name: Upload runners CSV as artifact
        uses: actions/upload-artifact@v4
        with:
          name: runners-db
          path: toprate_runners.csv
          retention-days: 90
          overwrite: true
      - name: Commit and push updated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add toprate_live.html toprate_runners.csv
          git diff --staged --quiet || git commit -m "TopRate update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

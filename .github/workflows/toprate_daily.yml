name: TopRate Daily

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Target date (YYYY-MM-DD), leave blank for today'
        required: false
        default: ''
  schedule:
    # All times UTC. AEST = UTC+10.
    # Single cron expression covering 9 AM, 12 PM, then every 30 min from 12:30 to 9 PM AEST.
    # In UTC: 23:00 (prev day), 02:00, then 02:30, 03:00, 03:30 ... 11:00
    # Use a 30-minute interval from 02:30 UTC to 11:00 UTC, plus the 9 AM AEST single fire
    - cron: '0 23 * * *'
    - cron: '*/30 2-10 * * *'
    - cron: '0 11 * * *'

concurrency:
  group: toprate-daily
  cancel-in-progress: false

jobs:
  run-toprate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests numpy pytz

      - name: Run TopRate script
        env:
          TOPRATE_USERNAME: ${{ secrets.TOPRATE_USERNAME }}
          TOPRATE_PASSWORD: ${{ secrets.TOPRATE_PASSWORD }}
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python toprate_daily.py --date "${{ github.event.inputs.date }}"
          else
            python toprate_daily.py
          fi

      - name: Commit and push outputs
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Pull in case another run pushed during our execution
          git pull --rebase origin main || true
          # Add each file individually so one missing file doesn't fail the rest
          git add toprate_runners.csv 2>/dev/null || true
          git add toprate_selections.csv 2>/dev/null || true
          git add toprate_price_history.csv 2>/dev/null || true
          git add toprate_live.html 2>/dev/null || true
          git add toprate_daily.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto: update TopRate data $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi

